<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Media Downloader Pro</title>

<style>
body {
    background:#0a0a0a;
    color:#00ffcc;
    font-family:monospace;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    text-align:center;
}

/* Tabs */
.tabs {
    display:flex;
    width:90%;
}
.tab {
    flex:1;
    padding:15px;
    background:#111;
    cursor:pointer;
}
.tab.active {
    background:#00ffcc;
    color:#000;
}

input {
    width:90%;
    padding:15px;
    font-size:16px;
    border-radius:10px;
    border:none;
    margin:20px 0;
}

button {
    width:80%;
    padding:15px;
    font-size:18px;
    margin:5px;
    border-radius:10px;
    background:#00ffcc;
    color:#0a0a0a;
    border:none;
}

.progress-container {
    width:90%;
    background:#222;
    border-radius:10px;
    margin-top:10px;
}
.progress-bar {
    width:0%;
    height:20px;
    background:#00ffcc;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>⚡ MEDIA DOWNLOADER PRO ⚡</h1>

<div class="tabs">
    <div class="tab active" onclick="switchTab('video')">🎬 Video</div>
    <div class="tab" onclick="switchTab('music')">🎵 Music</div>
</div>

<input id="url" placeholder="Paste link or search...">

<!-- VIDEO OPTIONS -->
<div id="videoBox">
    <button onclick="send('best')">Best</button>
    <button onclick="send('720')">720p</button>
    <button onclick="send('360')">360p</button>
</div>

<!-- MUSIC OPTION -->
<div id="musicBox" style="display:none;">
    <button onclick="send('mp3')">Download MP3</button>
</div>

<p id="status"></p>

<div class="progress-container">
    <div id="bar" class="progress-bar"></div>
</div>
<p id="percent">0%</p>

<script>
let currentTab = "video";
let interval;

function switchTab(tab){
    currentTab = tab;

    document.getElementById("videoBox").style.display = tab==="video" ? "block" : "none";
    document.getElementById("musicBox").style.display = tab==="music" ? "block" : "none";

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    event.target.classList.add("active");
}

function send(quality){
    let input = document.getElementById("url").value;

    if(!input){
        alert("Enter something!");
        return;
    }

    let url = input;

    // 🎵 Music search support
    if(currentTab === "music" && !input.startsWith("http")){
        url = "ytsearch1:" + input;
    }

    document.getElementById("status").innerText = "Downloading...";
    document.getElementById("bar").style.width = "0%";
    document.getElementById("percent").innerText = "0%";

    fetch("/download", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({url:url, quality:quality})
    });

    interval = setInterval(updateProgress, 1000);
}

function updateProgress(){
    fetch("/progress")
    .then(res => res.json())
    .then(data => {
        document.getElementById("bar").style.width = data.percent + "%";
        document.getElementById("percent").innerText = data.percent + "%";

        if(data.status === "done"){
            clearInterval(interval);
            document.getElementById("status").innerText = "Download finished!";
        }
    });
}
</script>

</body>
</html>
